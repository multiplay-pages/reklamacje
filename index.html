<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const processRowsData=window.processRowsData;
const templatesData=window.templatesData;

/* helpers */
function normalize(t){return String(t||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function templateById(id){return templatesData.find(t=>t.id===id)}
const PATH_META={'Szybka korekta':{color:'green'},'Formalna reklamacja':{color:'blue'},'Braki formalne':{color:'amber'},'Decyzja odmowna':{color:'red'}};
const ROLE_SHORT={'SCC':'SCC','BOK':'BOK','BOK / Dział Reklamacji':'BOK/DR','Dział Reklamacji':'Dział Rek.'};
function riskColor(r){if(r==='Niskie')return 'green';if(r==='Wysokie')return 'red';return 'amber'}
const TOKEN={
  green:{bg:'oklch(0.95 0.06 150)',fg:'oklch(0.32 0.12 150)',border:'oklch(0.84 0.08 150)'},
  blue:{bg:'oklch(0.94 0.06 250)',fg:'oklch(0.38 0.14 250)',border:'oklch(0.82 0.09 250)'},
  amber:{bg:'oklch(0.95 0.07 80)',fg:'oklch(0.42 0.13 70)',border:'oklch(0.85 0.09 75)'},
  red:{bg:'oklch(0.95 0.06 20)',fg:'oklch(0.40 0.16 22)',border:'oklch(0.84 0.09 20)'},
  violet:{bg:'oklch(0.94 0.06 300)',fg:'oklch(0.38 0.14 300)',border:'oklch(0.81 0.09 300)'},
};

/* ── Tweaks panel (inlined) ── */
const TWEAK_STYLE=`
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:260px;max-height:calc(100vh - 32px);display:flex;flex-direction:column;background:rgba(250,249,247,.88);color:#29261b;-webkit-backdrop-filter:blur(20px) saturate(160%);backdrop-filter:blur(20px) saturate(160%);border:.5px solid rgba(255,255,255,.6);border-radius:14px;box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);font:11.5px/1.4 ui-sans-serif,system-ui,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);width:22px;height:22px;border-radius:6px;cursor:default;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(41,38,27,.45);padding:8px 0 0}
  .twk-sect:first-child{padding-top:0}
  .twk-row-h{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0;flex-shrink:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}
`;

function useTweaks(defaults){
  const[values,setValues]=useState(defaults);
  const setTweak=useCallback((keyOrEdits,val)=>{
    const edits=typeof keyOrEdits==='object'&&keyOrEdits!==null?keyOrEdits:{[keyOrEdits]:val};
    setValues(prev=>({...prev,...edits}));
    window.parent.postMessage({type:'__edit_mode_set_keys',edits},'*');
  },[]);
  return[values,setTweak];
}

function TweaksPanel({children}){
  const[open,setOpen]=useState(false);
  useEffect(()=>{
    const onMsg=e=>{
      const t=e?.data?.type;
      if(t==='__activate_edit_mode')setOpen(true);
      else if(t==='__deactivate_edit_mode')setOpen(false);
    };
    window.addEventListener('message',onMsg);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',onMsg);
  },[]);
  const dismiss=()=>{setOpen(false);window.parent.postMessage({type:'__edit_mode_dismissed'},'*');};
  if(!open)return null;
  return(<><style>{TWEAK_STYLE}</style><div className="twk-panel"><div className="twk-hd"><b>Tweaks</b><button className="twk-x" onClick={dismiss}>&#215;</button></div><div className="twk-body">{children}</div></div></>);
}
function TweakSection({title,children}){return(<><div className="twk-sect">{title}</div>{children}</>);}
function TweakToggle({id,label,value,onChange}){
  return(<div className="twk-row-h"><div className="twk-lbl"><span>{label}</span></div><button type="button" className="twk-toggle" data-on={value?'1':'0'} onClick={()=>onChange&&onChange(!value)}><i /></button></div>);
}

/* ── Badge ── */
function Badge({color='blue',children,size='sm'}){
  const tok=TOKEN[color]||TOKEN.blue;
  return(<span style={{display:'inline-flex',alignItems:'center',background:tok.bg,color:tok.fg,border:`1px solid ${tok.border}`,borderRadius:999,padding:size==='sm'?'3px 8px':'4px 11px',fontSize:size==='sm'?11:12.5,fontWeight:700,whiteSpace:'nowrap',letterSpacing:'0.02em'}}>{children}</span>);
}

/* ── Button ── */
function Btn({children,onClick,primary,danger,small}){
  const[h,setH]=useState(false);
  const base={appearance:'none',border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:700,letterSpacing:'0.01em',borderRadius:small?10:12,padding:small?'6px 11px':'9px 18px',fontSize:small?12:14,transition:'all 0.13s ease',transform:h?'translateY(-1px)':'none'};

/* ── Modal ── */
function Modal({row,template,onClose,onCopy}){
  useEffect(()=>{
    const h=e=>{if(e.key==='Escape')onClose();};
    document.addEventListener('keydown',h);
    return()=>document.removeEventListener('keydown',h);
  },[onClose]);
  if(!template)return null;
  const pm=row?PATH_META[row.path]:PATH_META[template.path];
  return(
    <div style={{position:'fixed',inset:0,zIndex:1000,background:'rgba(10,15,30,0.55)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>

          <div style={{flex:1}}>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:10}}>
              {pm&&<Badge color={pm.color} size="md">{row?row.path:template.path}</Badge>}
              {row&&<Badge color={riskColor(row.risk)} size="md">Ryzyko: {row.risk}</Badge>}
              {row&&<Badge color="blue" size="md">{row.role}</Badge>}
              {!row&&<Badge color="violet" size="md">{template.channel}</Badge>}
            </div>
            <h2 style={{fontSize:20,fontWeight:700,letterSpacing:'-0.02em',lineHeight:1.3}}>{row?`Krok ${row.step}: ${row.path}`:template.title}</h2>
            {row&&<p style={{fontSize:13,color:'oklch(0.5 0.02 250)',marginTop:4}}>Termin: {row.deadline} &middot; Szablon: {template.id} &middot; {template.channel}</p>}

        </div>
        <div style={{flex:1,overflowY:'auto',padding:'20px 24px'}}>

          {row&&(<div style={{marginBottom:16}}><InfoBox label="Checklista"><ul style={{paddingLeft:18,margin:0}}>{row.checklist.map((item,i)=><li key={i} style={{marginBottom:4}}>{item}</li>)}</ul></InfoBox></div>)}

          </div>
          <div style={{background:'oklch(0.12 0.02 250)',borderRadius:16,overflow:'hidden'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
              <span style={{color:'oklch(0.68 0.04 250)',fontSize:12,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase'}}>Pełny szablon &mdash; {template.id}</span>

                    {checked&&<span style={{color:'#fff',fontSize:11,fontWeight:800}}>✓</span>}
                  </div>
                  <span style={{fontSize:14,lineHeight:1.5,color:checked?'oklch(0.6 0.02 250)':'oklch(0.25 0.02 250)',textDecoration:checked?'line-through':'none',transition:'all 0.14s'}}>{item}</span>
                </label>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ── Section Panel ── */
function SectionPanel({title,subtitle,children}){
  return(
    <div style={{background:'oklch(0.995 0.002 250)',border:'1px solid oklch(0.90 0.01 250)',borderRadius:20,marginBottom:20,overflow:'hidden',boxShadow:'0 2px 12px rgba(0,0,0,0.04)'}}>
      <div style={{padding:'18px 22px 14px',borderBottom:'1px solid oklch(0.92 0.01 250)'}}>
        <h2 style={{fontSize:18,fontWeight:700,letterSpacing:'-0.02em',marginBottom:subtitle?4:0}}>{title}</h2>
        {subtitle&&<p style={{fontSize:13.5,color:'oklch(0.5 0.02 250)'}}>{subtitle}</p>}
      </div>
      <div style={{padding:'18px 22px'}}>{children}</div>
    </div>
  );
}

/* ── App ── */
function App(){
  const TWEAK_DEFAULTS=/*EDITMODE-BEGIN*/{
    "showFlowDiagram": true,
    "showDecisionCards": true
  }/*EDITMODE-END*/;
  const[tweaks,setTweak]=useTweaks(TWEAK_DEFAULTS);
  const[nav,setNav]=useState('process');
  const[modal,setModal]=useState(null);
  const[toast,setToast]=useState({msg:'',visible:false});
  const toastTimer=useRef(null);
  const mainRef=useRef(null);

  function showToast(msg){
    if(toastTimer.current)clearTimeout(toastTimer.current);
    setToast({msg,visible:true});
    toastTimer.current=setTimeout(()=>setToast(p=>({...p,visible:false})),2000);
  }
  function openRow(row){const t=templateById(row.templateId);setModal({row,template:t});}
  function openTemplate(row,tpl){const t=tpl||(row?templateById(row.templateId):null);setModal({row,template:t});}
  async function copyRow(row){
    const t=templateById(row.templateId);
    const text=`Krok ${row.step} | ${row.role} | ${row.path}\n\nSytuacja: ${row.situation}\nDecyzja: ${row.decision}\nDziałanie: ${row.action}\nTermin: ${row.deadline}\nRyzyko: ${row.risk}\n\nSzablon ${t?.id||''}:\n${t?.text||''}`;
    await navigator.clipboard.writeText(text);showToast('Skopiowano krok');
  }
  async function copyTemplate(row,tpl){
    const t=tpl||modal?.template;
    if(!t)return;
    await navigator.clipboard.writeText(t.text);showToast('Skopiowano szablon');
  }
  function handleNav(id){setNav(id);if(mainRef.current)mainRef.current.scrollTop=0;}

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar active={nav} onNav={handleNav} />
      <main ref={mainRef} style={{flex:1,padding:'28px 32px',background:'oklch(0.97 0.004 250)',overflowX:'hidden',minWidth:0}}>

        {/* Hero */}
        <div style={{display:'grid',gridTemplateColumns:'1.3fr 0.7fr',gap:16,marginBottom:22}}>
          <div style={{background:'oklch(0.13 0.025 250)',borderRadius:20,padding:'28px 28px',boxShadow:'0 4px 24px rgba(0,0,0,0.12)'}}>
            <div style={{display:'inline-flex',alignItems:'center',background:'oklch(0.28 0.08 250)',color:'oklch(0.80 0.08 250)',borderRadius:999,padding:'5px 12px',fontSize:11,fontWeight:800,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:16}}>
              Wersja poprawiona &middot; szablony zgodne z dokumentem
            </div>
            <h1 style={{fontSize:'clamp(22px,2.8vw,34px)',fontWeight:700,letterSpacing:'-0.03em',lineHeight:1.1,color:'#fff',marginBottom:12}}>
              Interaktywny proces<br/>obsługi zgłoszeń i reklamacji
            </h1>
            <p style={{fontSize:14,color:'oklch(0.60 0.04 250)',lineHeight:1.65,marginBottom:22,maxWidth:520}}>
              Narzędzie dla SCC, BOK i Działu Reklamacji. Tabela prowadzi przez decyzję: szybka korekta czy formalna ścieżka reklamacyjna. W szczegółach — pełne szablony do kopiowania.
            </p>
            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              <Btn primary onClick={()=>handleNav('process')}>Tabela procesu</Btn>
              <Btn onClick={()=>handleNav('templates')}>Szablony komunikacji</Btn>
              <Btn onClick={()=>handleNav('checklist')}>Checklista</Btn>
            </div>
          </div>
          <div style={{background:'#fff',border:'1px solid oklch(0.90 0.01 250)',borderRadius:20,padding:'22px 22px',boxShadow:'0 2px 12px rgba(0,0,0,0.04)'}}>
            <div style={{fontSize:11,fontWeight:800,textTransform:'uppercase',letterSpacing:'0.07em',color:'oklch(0.45 0.03 250)',marginBottom:14}}>Zasada nadrzędna</div>
            <ul style={{padding:0,margin:0,listStyle:'none',display:'flex',flexDirection:'column',gap:10}}>
              {[
                {c:'green',t:'Potwierdzona awaria + standardowe rozliczenie = szybka korekta.'},
                {c:'amber',t:'Słowo "reklamacja", żądanie zwrotu lub odpowiedzi = tryb reklamacyjny.'},
                {c:'red',t:'B2B, sprawa niejednoznaczna lub żądanie ponad korektę = Dział Reklamacji.'},
                {c:'blue',t:'W korespondencji formalnej zawsze wskaż właściwego Dostawcę usług.'},
              ].map((item,i)=>(
                <li key={i} style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                  <div style={{width:7,height:7,borderRadius:999,background:TOKEN[item.c].fg,marginTop:7,flexShrink:0}}></div>
                  <span style={{fontSize:13.5,color:'oklch(0.28 0.02 250)',lineHeight:1.55}}>{item.t}</span>
                </li>
              ))}
            </ul>
          </div>
        </div>

        {nav==='process'&&(<>
          {tweaks.showDecisionCards&&(<SectionPanel title="Szybka kwalifikacja" subtitle="Wybierz sytuację poniżej, aby zrozumieć właściwą ścieżkę."><DecisionCards /></SectionPanel>)}
          {tweaks.showFlowDiagram&&(<SectionPanel title="Mapa procesu" subtitle="Od pierwszego kontaktu do korekty, wezwania lub odpowiedzi reklamacyjnej."><FlowDiagram /></SectionPanel>)}
          <SectionPanel title="Interaktywna tabela procesu" subtitle="Kliknij Szczegóły, aby zobaczyć checklistę i pełny szablon."><ProcessTable onOpen={openRow} onCopy={copyRow} /></SectionPanel>
        </>)}

        {nav==='templates'&&(<SectionPanel title="Pełne szablony komunikacji" subtitle="Wszystkie treści zgodne z dokumentem źródłowym. Kliknij Otwórz aby zobaczyć i skopiować."><TemplatesGrid onOpen={openTemplate} onCopy={copyTemplate} /></SectionPanel>)}

        {nav==='checklist'&&(<SectionPanel title="Minimalna checklista przed wysłaniem wiadomości" subtitle="Do stosowania przy każdej odpowiedzi do klienta."><ChecklistSection /></SectionPanel>)}

        <p style={{textAlign:'center',fontSize:12,color:'oklch(0.6 0.02 250)',paddingTop:4,paddingBottom:16}}>
          Materiał pomocniczy dla pracowników. Przed wysłaniem wiadomości uzupełnij pola w nawiasach kwadratowych i dopasuj treść do konkretnej sprawy. Nie zastępuje regulaminu, umowy ani decyzji osoby odpowiedzialnej za rozpatrywanie reklamacji.
        </p>
      </main>

      {modal&&(<Modal row={modal.row} template={modal.template} onClose={()=>setModal(null)} onCopy={()=>copyTemplate(modal.row,modal.template)} />)}
      <Toast msg={toast.msg} visible={toast.visible} />

      <TweaksPanel>
        <TweakSection title="Widok procesu">
          <TweakToggle id="showDecisionCards" label="Szybka kwalifikacja" value={tweaks.showDecisionCards} onChange={v=>setTweak('showDecisionCards',v)} />
          <TweakToggle id="showFlowDiagram" label="Mapa procesu" value={tweaks.showFlowDiagram} onChange={v=>setTweak('showFlowDiagram',v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
